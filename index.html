<!DOCTYPE html><html lang="ko">
<head>
<meta charset="UTF-8">
<title> Alphanam ~~~ 임연호 화이팅  Mario Style Game</title>
<style>
body { margin:0; overflow:hidden; background:#5c94fc; }
canvas { display:block; margin:0 auto; background:#5c94fc; }
</style>
</head>
<body>
<canvas id="game" width="800" height="450"></canvas><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRAVITY = 0.6;
const JUMP = -12;

const player = {
  x:100,
  y:0,
  w:28,
  h:32,
  vx:0,
  vy:0,
  onGround:false,
  dir:1
};

let cameraX = 0;

const keys = {};
addEventListener("keydown", e=>keys[e.code]=true);
addEventListener("keyup", e=>keys[e.code]=false);

// 맵 타일 (1=바닥)
const TILE = 32;
const level = [];
for(let i=0;i<200;i++){
  level.push(1);
}

// 공중 블록
const platforms = [
  {x:300,y:300,w:100,h:20},
  {x:500,y:250,w:100,h:20},
  {x:750,y:200,w:100,h:20}
];

// 적
const enemies = [
  {x:600,y:318,w:28,h:28,vx:-1,dead:false},
  {x:900,y:318,w:28,h:28,vx:-1,dead:false}
];

function update(){
  // 좌우 이동
  if(keys["ArrowLeft"]){ player.vx = -4; player.dir=-1; }
  else if(keys["ArrowRight"]){ player.vx = 4; player.dir=1; }
  else player.vx *= 0.8;

  // 점프
  if(keys["Space"] && player.onGround){
    player.vy = JUMP;
    player.onGround = false;
  }

  // 물리
  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;

  // 바닥 충돌
  if(player.y + player.h > 350){
    player.y = 350 - player.h;
    player.vy = 0;
    player.onGround = true;
  }

  // 플랫폼 충돌
  platforms.forEach(p=>{
    if(player.x < p.x+p.w && player.x+player.w > p.x &&
       player.y+player.h < p.y+10 && player.y+player.h+player.vy >= p.y){
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
    }
  });

  // 적
  enemies.forEach(e=>{
    if(e.dead) return;
    e.x += e.vx;

    if(hit(player,e)){
      if(player.vy > 0){
        e.dead = true;
        player.vy = -8;
      } else {
        alert("게임오버");
        location.reload();
      }
    }
  });

  // 카메라
  cameraX = player.x - 200;
}

function hit(a,b){
  return a.x < b.x+b.w &&
         a.x+a.w > b.x &&
         a.y < b.y+b.h &&
         a.y+a.h > b.y;
}

function draw(){
  ctx.clearRect(0,0,800,450);

  // 하늘
  ctx.fillStyle="#5c94fc";
  ctx.fillRect(0,0,800,450);

  // 바닥
  ctx.fillStyle="#c84b13";
  ctx.fillRect(0,350,800,100);

  // 플랫폼
  ctx.fillStyle="#8b4513";
  platforms.forEach(p=>{
    ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
  });

  // 적
  ctx.fillStyle="brown";
  enemies.forEach(e=>{
    if(!e.dead)
      ctx.fillRect(e.x - cameraX, e.y, e.w, e.h);
  });

  // 마리오
  ctx.fillStyle="red";
  ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

  // 눈
  ctx.fillStyle="#fff";
  ctx.fillRect(player.x - cameraX + 18, player.y+8, 5,5);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// 시작 위치 (바닥에서 시작)
player.y = 350 - player.h;

loop();
</script></body>
</html>
